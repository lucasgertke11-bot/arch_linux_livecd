# Bootloader Configuration for Calamares

# Bootloader type: grub, systemdboot, or none
bootloader=grub

# Kernel parameters
kernelParameters=quiet splash

# GRUB specific
grubInstall=true
grubInstallFlags=--target=x86_64-efi --efi-directory=/boot --bootloader-id=GRUB
grubMkconfig=/usr/bin/grub-mkconfig
grubDefaultEntry=0
grubTimeout=5

# systemd-boot specific
espMountPoint=/boot
