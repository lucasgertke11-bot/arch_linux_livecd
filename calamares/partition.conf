# Partition Configuration for Calamares

# Default filesystem types
defaultFileSystem=ext4
defaultPartitionTableType=gpt

# Boot partition
bootPartitionMountPoint=/boot
bootPartitionFS=vfat
bootPartitionSize=512M

# Swap
swapChoice=auto
swapFakeSwapFile=false

# LVM support
enableLVM=false
enableLuks=false

# Partition labels
partitionLayout=
alwaysShowPartitionLabels=true
